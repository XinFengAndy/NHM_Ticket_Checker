name: Ticket Monitor

on:
  # Schedule the script to run every 5 minutes
  # (GitHub Actions does not officially support 1-minute intervals reliably)
  schedule:
    # Runs every 5 minutes (fastest reliable cron on GitHub Actions)
    - cron: '*/5 * * * *'

  # Allows you to manually click a button to run the script immediately for testing
  workflow_dispatch:

jobs:
  check-tickets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Monitor Script
        env:
          # This maps the secrets you set in Settings to the Python os.environ
          SENDER_USER: ${{ secrets.SENDER_USER }}
          SENDER_PASS: ${{ secrets.SENDER_PASS }}
          RECEIVER: ${{ secrets.RECEIVER }}
        run: python monitor.py